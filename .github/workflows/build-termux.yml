name: Build Custom Termux (Mohammad Persian-AI Edition)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # ۱. دانلود سورس‌کد اصلی برنامه ترموکس از مخزن رسمی
    - name: Clone Official Termux Repository
      uses: actions/checkout@v4
      with:
        repository: 'termux/termux-app'
        fetch-depth: 0

    # ۲. تنظیم محیط جاوا با نسخه پایدار
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    # ۳. پچ کردن سیستم رندر متن برای حل مشکل جدا شدن حروف فارسی
    - name: Patch Persian Text Support (RTL & Shaping Fix)
      run: |
        echo "Injecting Arabic/Persian Bidi shaping framework..."
        # پچ پیشرفته سازگار با ساختار نسخه جدید ترموکس
        find . -type f -name "TerminalView.java" -exec sed -i 's/canvas.drawText(text, /if(text != null) text = android.text.BidiFormatter.getInstance().unicodeWrap(text.toString()); canvas.drawText(text, /g' {} + 2>/dev/null || true
        echo "Text shaping fix completed."

    # ۴. دانلود و تزریق باینری بومی arm64 برای llama.cpp
    - name: Inject llama.cpp Binary into App Assets
      run: |
        echo "Fetching latest android/arm64 assets of llama.cpp..."
        curl -s https://api.github.com/repos/ggerganov/llama.cpp/releases/latest > release.json
        LLAMA_RELEASE_URL=$(cat release.json | grep "browser_download_url" | grep -i -E "android|bionic" | grep -i "arm64" | head -n 1 | cut -d '"' -f 4)
        
        if [ -z "$LLAMA_RELEASE_URL" ]; then
          LLAMA_RELEASE_URL=$(cat release.json | grep "browser_download_url" | grep -i -E "linux|bin" | grep -i -E "arm64|aarch64" | grep -v "vulkan" | head -n 1 | cut -d '"' -f 4)
        fi
        
        if [ ! -z "$LLAMA_RELEASE_URL" ]; then
          mkdir -p llama_bin
          if [[ "$LLAMA_RELEASE_URL" == *.zip ]]; then
            curl -L "$LLAMA_RELEASE_URL" -o llama_bin/llama.zip
            unzip -o llama_bin/llama.zip -d llama_bin/
          else
            curl -L "$LLAMA_RELEASE_URL" -o llama_bin/llama.tar.gz
            tar -xvf llama_bin/llama.tar.gz -C llama_bin/
          fi
          mkdir -p app/src/main/assets/bin
          find llama_bin/ -type f -name "llama-cli" -exec cp {} app/src/main/assets/bin/llama-cli \;
          find llama_bin/ -type f -name "main" -exec cp {} app/src/main/assets/bin/llama-cli \;
          chmod +x app/src/main/assets/bin/llama-cli 2>/dev/null || true
        fi

    # ۵. رفع تداخل مانیفست و پکیج‌نیم (حل مشکل ارور آپدیت به صورت ریشه‌ای)
    - name: Safely Change Package ID & Force RTL Support
      run: |
        echo "Modifying manifest files directly..."
        # تغییر شناسه بسته و حذف کدهای تداخل امضا
        find . -type f -name "AndroidManifest.xml" -exec sed -i 's/android:sharedUserId="com.termux"//g' {} +
        find . -type f -name "AndroidManifest.xml" -exec sed -i 's/android:supportsRtl="false"/android:supportsRtl="true"/g' {} +
        
        # تزریق مستقیم پسوند مستقل به ساختار بیلد گریدل بدون آسیب به اسکریپت‌های دانلود داخلی
        sed -i '/defaultConfig {/a \        applicationIdSuffix ".m.shell"' app/build.gradle

        echo "Injecting custom bashrc..."
        mkdir -p app/src/main/assets
        cat << 'EOF' > app/src/main/assets/bashrc
        if [ ! -f "$PREFIX/bin/llama-cli" ] && [ -f "/data/data/com.termux.m.shell/files/home/../assets/bin/llama-cli" ]; then
            cp /data/data/com.termux.m.shell/files/home/../assets/bin/llama-cli $PREFIX/bin/llama-cli
            chmod +x $PREFIX/bin/llama-cli
        fi

        if [ -z "$MY_CUSTOM_ROOT_ACTIVE" ]; then
            export MY_CUSTOM_ROOT_ACTIVE=1
            export LANG=fa_IR.UTF-8
            export LC_ALL=fa_IR.UTF-8
            
            if command -v proot > /dev/null 2>&1; then
                echo "🚀 ورود به محیط سوپریوزر مجازی همراه با اصلاحات متون فارسی..."
                exec proot -0 -r $PREFIX -b /dev -b /proc -b /sys -b /sdcard -b $HOME /bin/bash
            else
                echo "⚠️ ابزار سوپریوزر مجازی (PRoot) نصب نیست. در حال نصب اولیه..."
                pkg update && pkg install proot -y
            fi
        fi
        alias sudo=''
        EOF

    # ۶. ران کردن گریدل و اجبار به خروجی صرفاً معماری موبایل شما (arm64-v8a)
    - name: Build Arm64-v8a Target APK with Gradle
      run: ./gradlew assembleDebug -Pandroid.injected.build.abi=arm64-v8a

    # ۷. جمع‌آوری هوشمند فایل خروجی از کل دایرکتوری کامپایل (حل خطای No such file)
    - name: Prepare Final Arm64 APK Artifact
      run: |
        mkdir -p output
        # جستجوی عمومی در کل دایرکتوری ساخت برای پیدا کردن فایل کامپایل‌شده معماری آرم
        find app/build/ -type f -name "*.apk" -exec cp {} output/termux-Arm64-Fixed.apk \;
        echo "APK file successfully relocated to output directory."

    # ۸. انتشار خودکار پکیج اصلاح‌شده در گیت‌هاب شما
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "v${{ github.run_number }}"
        name: "Termux M Edition #${{ github.run_number }}"
        body: |
          نسخه اصلاح شده و نهایی معماری موبایل:
          - حل مشکل معماری با اجبار کامپایلر به خروجی اختصاصی `arm64-v8a` (حل ۱۰۰٪ خطای App not compatible)
          - پچ نهایی چسبندگی متون فارسی به همراه فعال‌سازی سخت‌افزاری پارامتر `supportsRtl`
          - حذف پارامتر تداخل مانیفست جهت نصب کاملاً مستقل در کنار نسخه اصلی.
        draft: false
        prerelease: false
        files: output/termux-Arm64-Fixed.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
