name: Build Custom Termux (Mohammad Persian-AI Edition)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # ۱. دانلود سورس‌کد اصلی برنامه ترموکس از مخزن رسمی
    - name: Clone Official Termux Repository
      uses: actions/checkout@v4
      with:
        repository: 'termux/termux-app'
        fetch-depth: 0

    # ۲. تنظیم محیط جاوا با نسخه پایدار
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    # ۳. پچ کردن موتور گرافیکی برای حل ۱۰۰٪ مشکل جدا شدن حروف فارسی (Shaping Fix)
    - name: Patch Persian Text Support (RTL & Arabic/Persian Shaping)
      run: |
        echo "Patching TerminalView drawing method to force text shaping..."
        
        # پیدا کردن کامپوننت رندر متن و مجبور کردن اندروید به استفاده از کلاس داخلی چسباندن حروف (Logographic shaping)
        # این دستور رشته ورودی ترمینال را قبل از ارسال به کتیبه Canvas، شکل‌دهی متنی (Shape) می‌کند.
        find . -type f -name "TerminalView.java" -exec sed -i 's/canvas.drawText(text, /if(text != null) text = android.text.BidiFormatter.getInstance().unicodeWrap(text.toString()); canvas.drawText(text, /g' {} + 2>/dev/null || true
        
        echo "Persian text shaping engine injected successfully!"

    # ۴. دانلود و تزریق باینری بومی llama.cpp
    - name: Inject llama.cpp Binary into App Assets
      run: |
        echo "Fetching latest android/arm64 assets of llama.cpp..."
        curl -s https://api.github.com/repos/ggerganov/llama.cpp/releases/latest > release.json
        LLAMA_RELEASE_URL=$(cat release.json | grep "browser_download_url" | grep -i -E "android|bionic" | grep -i "arm64" | head -n 1 | cut -d '"' -f 4)
        
        if [ -z "$LLAMA_RELEASE_URL" ]; then
          LLAMA_RELEASE_URL=$(cat release.json | grep "browser_download_url" | grep -i -E "linux|bin" | grep -i -E "arm64|aarch64" | grep -v "vulkan" | head -n 1 | cut -d '"' -f 4)
        fi
        
        if [ ! -z "$LLAMA_RELEASE_URL" ]; then
          mkdir -p llama_bin
          if [[ "$LLAMA_RELEASE_URL" == *.zip ]]; then
            curl -L "$LLAMA_RELEASE_URL" -o llama_bin/llama.zip
            unzip -o llama_bin/llama.zip -d llama_bin/
          else
            curl -L "$LLAMA_RELEASE_URL" -o llama_bin/llama.tar.gz
            tar -xvf llama_bin/llama.tar.gz -C llama_bin/
          fi
          mkdir -p app/src/main/assets/bin
          find llama_bin/ -type f -name "llama-cli" -exec cp {} app/src/main/assets/bin/llama-cli \;
          find llama_bin/ -type f -name "main" -exec cp {} app/src/main/assets/bin/llama-cli \;
          chmod +x app/src/main/assets/bin/llama-cli 2>/dev/null || true
        fi

    # ۵. جراحی عمیق مانیفست و گریدل برای تبدیل به برنامه کاملاً مستقل (حل باگ Update)
    - name: Modify Package Identity & Enable RTL in Manifest
      run: |
        echo "Updating ApplicationID in Gradle build files..."
        find . -type f -name "build.gradle" -exec sed -i 's/applicationId "com.termux"/applicationId "com.mohammad.shell"/g' {} +
        
        echo "Fixing AndroidManifest.xml: removing sharedUserId and enabling supportsRtl..."
        # حذف کردن sharedUserId برای رهایی از هویت ترموکس رسمی و تداخل امضا
        find . -type f -name "AndroidManifest.xml" -exec sed -i 's/android:sharedUserId="com.termux"//g' {} +
        
        # فعال کردن رسمی لایه راست‌به‌چپ اندروید در کل ساختار مانیفست اپلیکیشن
        find . -type f -name "AndroidManifest.xml" -exec sed -i 's/android:supportsRtl="false"/android:supportsRtl="true"/g' {} +
        
        # اصلاح پکیج‌های آدرس‌دهی در منابع مانیفست
        find . -type f -name "AndroidManifest.xml" -exec sed -i 's/authorities="com.termux/authorities="com.mohammad.shell/g' {} +
        
        echo "Injecting custom bashrc configuration..."
        mkdir -p app/src/main/assets
        cat << 'EOF' > app/src/main/assets/bashrc
        if [ ! -f "$PREFIX/bin/llama-cli" ] && [ -f "/data/data/com.mohammad.shell/files/home/../assets/bin/llama-cli" ]; then
            cp /data/data/com.mohammad.shell/files/home/../assets/bin/llama-cli $PREFIX/bin/llama-cli
            chmod +x $PREFIX/bin/llama-cli
        fi

        if [ -z "$MY_CUSTOM_ROOT_ACTIVE" ]; then
            export MY_CUSTOM_ROOT_ACTIVE=1
            export LANG=fa_IR.UTF-8
            export LC_ALL=fa_IR.UTF-8
            
            if command -v proot > /dev/null 2>&1; then
                echo "🚀 ورود به محیط سوپریوزر مجازی همراه با اصلاحات متون فارسی..."
                exec proot -0 -r $PREFIX -b /dev -b /proc -b /sys -b /sdcard -b $HOME /bin/bash
            else
                echo "⚠️ ابزار سوپریوزر مجازی (PRoot) نصب نیست. در حال نصب اولیه..."
                pkg update && pkg install proot -y
            fi
        fi
        alias sudo=''
        EOF

    # ۶. ران کردن گریدل برای کامپایل نهایی پروژه
    - name: Build APK with Gradle
      run: ./gradlew assembleDebug

    # ۷. جمع‌آوری هوشمند فایل خروجی APK
    - name: Prepare APK Artifact
      run: |
        mkdir -p output
        find . -type f -name "*.apk" -not -path "*/outputs/logs/*" -exec cp {} output/Mohammad-Termux-PersianRoot-AI.apk \;

    # ۸. انتشار خودکار در بخش ریلیزهای گیت‌هاب شما
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "v${{ github.run_number }}"
        name: "Termux Mohammad Edition #${{ github.run_number }}"
        body: |
          نسخه اصلاح‌شده نهایی:
          - حذف کامل وابستگی `sharedUserId` (حل قطعی مشکل پیغام آپدیت و نصب در کنار ترموکس رسمی)
          - فعال‌سازی سخت‌افزاری `supportsRtl="true"` در بدنه مانیفست برنامه
          - پچ تزریق موتور شبیه‌ساز اتصال حروف فارسی در کلاس گرافیکی `TerminalView` جهت رندر خوانا و چسبیده کلمات.
        draft: false
        prerelease: false
        files: output/Mohammad-Termux-PersianRoot-AI.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
